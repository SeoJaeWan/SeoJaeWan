<svg width="900" height="320" viewBox="0 0 900 320" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgWall" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0D1117" />
            <stop offset="1" stop-color="#161B22" />
        </linearGradient>

        <linearGradient id="monitorFrame" x1="0" y1="0" x2="1" y2="1">
            <stop stop-color="#2D333B" />
            <stop offset="1" stop-color="#22272E" />
        </linearGradient>

        <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
            <stop stop-color="#0B1220" />
            <stop offset="1" stop-color="#0F172A" />
        </linearGradient>

        <filter id="blurXL" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="18" />
        </filter>

        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <filter id="neonGlow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="3.6" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <clipPath id="screenClip">
            <rect x="236" y="104" width="388" height="152" rx="12" />
        </clipPath>
    </defs>

    <!-- background -->
    <rect width="900" height="320" rx="20" fill="url(#bgWall)" />

    <!-- ambient light -->
    <circle cx="185" cy="62" r="120" fill="#3B82F6" opacity="0.10" filter="url(#blurXL)" />
    <circle cx="735" cy="76" r="120" fill="#38BDF8" opacity="0.08" filter="url(#blurXL)" />

    <!-- window -->
    <g transform="translate(54 44)">
        <!-- window -->
        <rect x="0" y="0" width="128" height="92" rx="12" fill="#111827" stroke="#2B3643" />
        <rect x="10" y="10" width="108" height="72" rx="8" fill="url(#windowGlow)" />
        <line x1="64" y1="10" x2="64" y2="82" stroke="#334155" />
        <line x1="10" y1="46" x2="118" y2="46" stroke="#334155" />
        <circle cx="84" cy="28" r="18" fill="#93C5FD" opacity="0.20">
            <animate attributeName="opacity" values="0.18;0.28;0.18" dur="5s" repeatCount="indefinite" />
        </circle>

        <!-- clock under window, centered -->
        <g transform="translate(20 104)">
            <rect x="0" y="0" width="88" height="30" rx="8" fill="#0B1220" stroke="#2B3643" />
            <rect x="4" y="4" width="80" height="22" rx="5" fill="#111827" />

            <rect x="4" y="4" width="80" height="22" rx="5" fill="#FB7185" opacity="0.05">
                <animate attributeName="opacity" values="0.04;0.08;0.04" dur="3s" repeatCount="indefinite" />
            </rect>

            <text
                x="44"
                y="20"
                text-anchor="middle"
                fill="#FB7185"
                font-size="14"
                font-family="Consolas, Monaco, monospace"
                font-weight="700"
                filter="url(#neonGlow)"
            >
                19:42
            </text>
        </g>
    </g>

    <!-- title -->
    <text x="430" y="46" text-anchor="middle" fill="#F8FAFC" font-size="21" font-family="Verdana, Arial, sans-serif" font-weight="700">
        SeoJaeWan's Coding Room
    </text>
    <text x="430" y="68" text-anchor="middle" fill="#94A3B8" font-size="11.5" font-family="Verdana, Arial, sans-serif">
        Frontend Developer · React · Next.js · TypeScript
    </text>

    <!-- wall shelf -->
    <!-- detailed wall shelf -->
    <g transform="translate(670 54)">
        <!-- shelf shadow -->
        <rect x="6" y="42" width="160" height="10" rx="5" fill="#0B1220" opacity="0.35" />

        <!-- shelf -->
        <rect x="0" y="34" width="174" height="8" rx="4" fill="#364152" />
        <rect x="0" y="38" width="174" height="5" rx="2.5" fill="#1F2937" opacity="0.65" />

        <!-- left book stack -->
        <g transform="translate(10 0)">
            <rect x="0" y="2" width="16" height="32" rx="3" fill="#EF4444" />
            <rect x="2" y="5" width="2" height="24" rx="1" fill="#FCA5A5" opacity="0.65" />
            <rect x="11" y="6" width="3" height="3" rx="1" fill="#FEE2E2" opacity="0.8" />
        </g>

        <g transform="translate(28 6)">
            <rect x="0" y="0" width="20" height="28" rx="3" fill="#F59E0B" />
            <rect x="3" y="4" width="2" height="20" rx="1" fill="#FCD34D" opacity="0.75" />
            <rect x="8" y="6" width="8" height="2" rx="1" fill="#FEF3C7" opacity="0.8" />
            <rect x="8" y="11" width="6" height="2" rx="1" fill="#FEF3C7" opacity="0.6" />
        </g>

        <g transform="translate(50 1) rotate(-2)">
            <rect x="0" y="0" width="17" height="33" rx="3" fill="#22C55E" />
            <rect x="3" y="4" width="2" height="24" rx="1" fill="#86EFAC" opacity="0.75" />
            <rect x="8" y="8" width="6" height="2" rx="1" fill="#DCFCE7" opacity="0.8" />
        </g>

        <g transform="translate(70 7)">
            <rect x="0" y="0" width="19" height="27" rx="3" fill="#3B82F6" />
            <rect x="3" y="4" width="2" height="18" rx="1" fill="#93C5FD" opacity="0.75" />
            <rect x="9" y="6" width="7" height="2" rx="1" fill="#DBEAFE" opacity="0.85" />
            <rect x="9" y="11" width="5" height="2" rx="1" fill="#DBEAFE" opacity="0.6" />
        </g>

        <g transform="translate(92 3) rotate(1.5)">
            <rect x="0" y="0" width="15" height="31" rx="3" fill="#A855F7" />
            <rect x="2" y="4" width="2" height="22" rx="1" fill="#D8B4FE" opacity="0.8" />
            <rect x="7" y="7" width="5" height="2" rx="1" fill="#F3E8FF" opacity="0.8" />
        </g>

        <!-- bookend -->
        <rect x="112" y="12" width="6" height="22" rx="2" fill="#64748B" />

        <!-- horizontal books -->
        <g transform="translate(124 14)">
            <rect x="0" y="12" width="34" height="8" rx="3" fill="#334155" />
            <rect x="2" y="14" width="30" height="1.5" rx="0.75" fill="#94A3B8" opacity="0.5" />

            <rect x="4" y="4" width="30" height="8" rx="3" fill="#475569" />
            <rect x="7" y="6" width="24" height="1.5" rx="0.75" fill="#CBD5E1" opacity="0.5" />

            <rect x="8" y="0" width="24" height="6" rx="3" fill="#64748B" />
        </g>
    </g>

    <!-- neon wall links -->
    <a href="mailto:sjw7324@gmail.com" target="_blank">
        <g transform="translate(707 118)" style="cursor: pointer">
            <rect x="0" y="0" width="100" height="36" rx="10" fill="#111827" stroke="#2A3441" />
            <text x="50" y="23" text-anchor="middle" fill="#FB7185" font-size="13.5" font-family="Verdana, Arial, sans-serif" filter="url(#neonGlow)">
                Gmail
                <animate attributeName="opacity" values="0.55;1;0.55" dur="4.5s" repeatCount="indefinite" />
            </text>
        </g>
    </a>

    <a href="https://www.linkedin.com/in/%EC%9E%AC%EC%99%84-%EC%84%9C-95216825b/" target="_blank">
        <g transform="translate(707 162)" style="cursor: pointer">
            <rect x="0" y="0" width="100" height="36" rx="10" fill="#111827" stroke="#2A3441" />
            <text x="50" y="23" text-anchor="middle" fill="#7DD3FC" font-size="13.5" font-family="Verdana, Arial, sans-serif" filter="url(#neonGlow)">
                LinkedIn
                <animate attributeName="opacity" values="1;0.5;1" dur="5.2s" repeatCount="indefinite" />
            </text>
        </g>
    </a>

    <a href="https://www.seojaewan.com/" target="_blank">
        <g transform="translate(707 206)" style="cursor: pointer">
            <rect x="0" y="0" width="100" height="36" rx="10" fill="#111827" stroke="#2A3441" />
            <text x="50" y="23" text-anchor="middle" fill="#A5F3FC" font-size="13.5" font-family="Verdana, Arial, sans-serif" filter="url(#neonGlow)">
                Blog
                <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite" />
            </text>
        </g>
    </a>

    <!-- floor -->
    <path d="M0 220H900V320H0V220Z" fill="url(#floorGrad)" />

    <!-- monitor -->
    <g transform="translate(220 90)">
        <rect x="0" y="0" width="420" height="180" rx="16" fill="url(#monitorFrame)" />
        <rect x="16" y="14" width="388" height="152" rx="12" fill="url(#screenGrad)" stroke="#1E293B" />

        <!-- screen light -->
        <rect x="16" y="14" width="388" height="152" rx="12" fill="#60A5FA" opacity="0.04">
            <animate attributeName="opacity" values="0.04;0.07;0.04" dur="4.8s" repeatCount="indefinite" />
        </rect>
    </g>

    <!-- screen content -->
    <g clip-path="url(#screenClip)">
        <!-- code header dots -->
        <circle cx="246" cy="118" r="4" fill="#F87171" />
        <circle cx="260" cy="118" r="4" fill="#FBBF24" />
        <circle cx="274" cy="118" r="4" fill="#34D399" />

        <!-- line numbers -->
        <text x="242" y="142" fill="#475569" font-size="12" font-family="Consolas, Monaco, monospace">1</text>
        <text x="242" y="166" fill="#475569" font-size="12" font-family="Consolas, Monaco, monospace">2</text>
        <text x="242" y="190" fill="#475569" font-size="12" font-family="Consolas, Monaco, monospace">3</text>

        <!-- code -->
        <text x="254" y="142" font-size="13" font-family="Consolas, Monaco, monospace">
            <tspan fill="#C084FC">const</tspan>
            <tspan fill="#E2E8F0">developer</tspan>
            <tspan fill="#7DD3FC">=</tspan>
            <tspan fill="#86EFAC">"SeoJaeWan"</tspan>
            <tspan fill="#E2E8F0">;</tspan>
        </text>

        <text x="254" y="166" font-size="13" font-family="Consolas, Monaco, monospace">
            <tspan fill="#C084FC">const</tspan>
            <tspan fill="#E2E8F0">hobbies</tspan>
            <tspan fill="#7DD3FC">=</tspan>
            <tspan fill="#FCD34D">["Games", "Travel (Japan)"]</tspan>
            <tspan fill="#E2E8F0">;</tspan>
        </text>

        <text x="254" y="190" font-size="13" font-family="Consolas, Monaco, monospace">
            <tspan fill="#C084FC">const</tspan>
            <tspan fill="#E2E8F0">interests</tspan>
            <tspan fill="#7DD3FC">=</tspan>
            <tspan fill="#67E8F9">"AI agents for development"</tspan>
            <tspan fill="#E2E8F0">;</tspan>
        </text>

        <!-- blinking cursor -->
        <rect x="590" y="178" width="7" height="16" rx="1.5" fill="#60A5FA" filter="url(#softGlow)">
            <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
        </rect>
    </g>
</svg>
